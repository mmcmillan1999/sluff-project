<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" href="/sluff-app-icon-v1.png" sizes="512x512" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sluff | Mobile Trick-Taking Card Game</title>
    <meta
      name="description"
      content="Join Sluff Alpha Season 2, a mobile-first trick-taking card game for 3 or 4 players where every card is played with an intentional flick."
    />
    <meta name="application-name" content="Sluff" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <!-- No color-scheme meta: it would flip the UA default text color to white,
         and the game UI (nameplates, round summary) inherits default colors
         onto light backgrounds. -->
    <meta name="theme-color" content="#0b1711" />

    <link rel="canonical" href="https://playsluff.com/" />
    <link rel="manifest" href="/manifest.json" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Sluff" />
    <meta property="og:url" content="https://playsluff.com/" />
    <meta property="og:title" content="Sluff Alpha Season 2 — Flick Cards. Win Tricks." />
    <meta
      property="og:description"
      content="A mobile-first trick-taking card game for 3 or 4 players. Bid boldly, flick every card, and compete for the table."
    />
    <meta property="og:image" content="https://playsluff.com/sluff-social-preview-v1.png" />
    <meta property="og:image:secure_url" content="https://playsluff.com/sluff-social-preview-v1.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Sluff Alpha Season 2 — a mobile-first card game built around an intentional flick."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sluff Alpha Season 2 — Flick Cards. Win Tricks." />
    <meta
      name="twitter:description"
      content="A mobile-first trick-taking card game for 3 or 4 players. Bid boldly, flick every card, and compete for the table."
    />
    <meta name="twitter:image" content="https://playsluff.com/sluff-social-preview-v1.png" />
    <meta
      name="twitter:image:alt"
      content="Sluff Alpha Season 2 — a mobile-first card game built around an intentional flick."
    />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sluff" />
    <link rel="apple-touch-icon" href="/sluff-app-icon-v1.png" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>

[build]
  base = "frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never let clients cache the staleness beacon or the HTML shell — hashed
# assets (JS/CSS) are immutable and safe to cache forever by default.
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Environment variables not needed - using smart detection in api.js
# The app will automatically detect which backend to use based on the frontend URL